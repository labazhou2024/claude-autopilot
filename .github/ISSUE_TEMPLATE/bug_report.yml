name: Bug Report
description: Report a bug in claude-autopilot
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
  - type: input
    id: version
    attributes:
      label: Version
      description: claude-autopilot version (pip show claude-autopilot)
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of python --version
  - type: input
    id: os
    attributes:
      label: Operating system
